{% extends "base.html" %}
{% block title %}Formulario de Pokemon{% endblock %}
{% block content %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="alert alert-danger">{{ form.non_field_errors }}</div>
        {% endif %}
        {{ form.as_p }}

        <div class="mt-4">
            <button type="submit" class="btn btn-primary me-2">Guardar Pokemon</button>
            <a href="{% url 'pokedex:index' %}" class="btn btn-secondary">Regresar</a>
        </div>
    </form>
{% endblock content %}
